<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="50%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>

    <!-- Glowing effect gradients -->
    <linearGradient id="glowAttn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="glowFFN" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <!-- Node Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      /* Keyframe animations for dynamic/moving aspects */
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.6)); }
        100% { transform: scale(1); opacity: 0.8; }
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -40;
        }
      }
      @keyframes bgShift {
        0% { stop-color: #0d1117; }
        50% { stop-color: #1a1f2c; }
        100% { stop-color: #0d1117; }
      }

      .animated-bg {
        animation: bgShift 10s infinite alternate;
      }
      .node-attn {
        animation: float 6s ease-in-out infinite;
        transform-origin: 300px 200px;
      }
      .node-ffn {
        animation: float 6s ease-in-out infinite alternate;
        transform-origin: 900px 200px;
      }
      .main-title {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        font-size: 54px;
        letter-spacing: 2px;
      }
      .subtitle {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-weight: 500;
        fill: #9ca3af;
        font-size: 20px;
        letter-spacing: 1px;
      }
      .flow-line {
        stroke-dasharray: 8, 12;
        animation: dash 2s linear infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="15" />

  <!-- Animated Grid Pattern Overlay -->
  <g opacity="0.15">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#475569" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#475569" stroke-width="1" />
  </g>

  <!-- Connection Lines (Parallel pathways) -->
  <path class="flow-line" d="M 150,200 L 450,120 L 750,200" fill="none" stroke="url(#glowAttn)" stroke-width="3" />
  <path class="flow-line" d="M 150,200 L 450,280 L 750,200" fill="none" stroke="url(#glowFFN)" stroke-dasharray="10, 10" stroke-width="3" />

  <!-- Input Node -->
  <circle cx="150" cy="200" r="12" fill="#ffffff" filter="url(#glow)" />
  <text x="150" y="235" font-family="'Segoe UI', sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Input Hidden State</text>

  <!-- Attention Path Node -->
  <g class="node-attn">
    <rect x="375" y="80" width="150" height="80" rx="10" fill="#1e293b" stroke="url(#glowAttn)" stroke-width="2" filter="url(#glow)" />
    <text x="450" y="125" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#38bdf8" text-anchor="middle">Self-Attention</text>
  </g>

  <!-- FFN Path Node -->
  <g class="node-ffn">
    <rect x="375" y="240" width="150" height="80" rx="10" fill="#1e293b" stroke="url(#glowFFN)" stroke-width="2" filter="url(#glow)" />
    <text x="450" y="285" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#ec4899" text-anchor="middle">Parallel FFN</text>
  </g>

  <!-- Summation / Output Node -->
  <circle cx="750" cy="200" r="12" fill="#ffffff" filter="url(#glow)" />
  <text x="750" y="235" font-family="'Segoe UI', sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Parallel Add</text>

  <!-- Text Branding -->
  <text x="850" y="195" class="main-title">Parallel</text>
  <text x="850" y="245" class="main-title" fill="#818cf8" style="fill: #818cf8;">Attention</text>
  <text x="850" y="280" class="subtitle">Hardware-Fused Optimization</text>

</svg>
